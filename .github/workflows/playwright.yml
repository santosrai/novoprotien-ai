name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Node dependencies
        run: npm ci
      - name: Install Python dependencies
        run: pip install -r server/requirements.txt && pip install playwright && playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd tests/e2e && python3 utils/test_runner.py
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: tests/e2e/reports/
          retention-days: 30
